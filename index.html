<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
<meta http-equiv="Cache-Control" content="no-store" />
<!-- Launch full-screen (no browser chrome) when added to the home screen -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Motor insurance" />
<meta name="theme-color" content="#ffffff" />
<title>Motor 2.0 — Plate changes (Option 01)</title>
<style>
  :root{
    --brand:#1d68ff;
    --brand-50:#f0f5ff;
    --gray-900:#34323e;
    --gray-400:#bec0ca;
    --gray-300:#d5d6dd;
    --border-tertiary:#e3e4e8;
    --text-secondary:#606476;
    --green-600:#29a366;
    --green-50:#ebfaf2;
    --success-500:#30c078;
    --red:#e5484d;
    --red-50:#fff0f0;
    --white:#ffffff;
    --black:#000000;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:"Ping AR + LT","SF Pro","Helvetica Neue",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    background:#3a3a3f;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:32px 16px;
    color:var(--black);
  }

  /* ---------- Phone frame ---------- */
  .phone{
    width:375px;
    height:812px;
    background:var(--white);
    border-radius:40px;
    position:relative;
    overflow:hidden;
    box-shadow:0 24px 60px rgba(0,0,0,.45);
    display:flex;
    flex-direction:column;
  }

  /* version badge — lets you confirm the latest build is loaded */
  .verbadge{
    position:absolute;top:8px;left:10px;z-index:50;
    font-size:9px;font-weight:700;color:#b9bbc4;letter-spacing:.5px;
    pointer-events:none;
  }

  /* ---------- Status bar ---------- */
  .statusbar{
    height:54px;
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    padding:0 26px 10px;
    flex-shrink:0;
  }
  .statusbar .time{font-weight:600;font-size:16px;letter-spacing:-.3px;}
  .statusbar .icons{display:flex;align-items:center;gap:7px;}
  .statusbar svg{display:block;}

  /* ---------- Nav / title ---------- */
  .navbar{
    height:44px;
    display:flex;
    align-items:center;
    padding:0 16px;
    position:relative;
    flex-shrink:0;
  }
  .navbar .title{
    position:absolute;left:0;right:0;text-align:center;
    font-weight:700;font-size:16px;letter-spacing:-.43px;pointer-events:none;
  }
  .icon-btn{
    width:36px;height:36px;border:none;background:transparent;
    display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:50%;
    color:var(--gray-900);
  }
  .icon-btn:active{background:#f0f0f2;}
  .navbar .chat{margin-left:auto;}

  /* ---------- Body / scroll area ---------- */
  .content{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:24px 0 0;
    overflow-y:auto;
  }
  .content::-webkit-scrollbar{width:0;}

  .heading{
    width:227px;text-align:center;font-weight:700;font-size:16px;line-height:1.4;
    color:var(--gray-900);margin:0 0 16px;
  }

  /* ---------- Number plate ---------- */
  .plate{
    width:260px;height:51px;border:2px solid #000;border-radius:4px;background:#fff;
    display:flex;align-items:stretch;overflow:hidden;
    box-shadow:inset 0 4px 4px rgba(0,0,0,.18);flex-shrink:0;
    transition:border-color .2s;
  }
  .plate.error{border-color:var(--red);}
  .plate .code{
    width:52px;display:flex;align-items:center;justify-content:center;
    font-family:"Roboto",Arial,sans-serif;font-weight:700;font-size:30px;color:#0d0d0d;
  }
  .plate .code.placeholder{color:#c4c4c4;}
  .plate .emirate{
    width:60px;display:flex;flex-direction:column;align-items:center;justify-content:center;
    line-height:1.05;gap:1px;padding-top:2px;
  }
  .plate .emirate .ar{font-size:9px;font-weight:700;color:#111;direction:rtl;}
  .plate .emirate .code-abbr{font-size:7px;font-weight:700;letter-spacing:.5px;color:#111;}
  .plate .number{
    flex:1;display:flex;align-items:center;justify-content:center;
    font-family:"Roboto",Arial,sans-serif;font-weight:700;font-size:34px;letter-spacing:3px;color:#0d0d0d;
  }
  .plate .number.placeholder{color:#c4c4c4;}

  /* ---------- Alert ---------- */
  .alert{
    position:absolute;top:108px;left:50%;transform:translateX(-50%);z-index:40;
    width:315px;display:none;align-items:center;gap:8px;
    --accent:#e5484d;
    background:var(--red-50);border:none;border-radius:8px;
    padding:9px 12px;font-size:12px;color:#b42318;font-weight:500;
  }
  .alert.warn{--accent:#e0a017;background:#fff8ea;color:#8a5a00;}
  .alert.show{display:flex;}
  .alert svg{flex-shrink:0;}
  .alert b{font-weight:700;}

  /* ---------- Tabs ---------- */
  .tabs{
    position:relative;
    width:308px;margin:16px 0 20px;background:var(--gray-900);border-radius:100px;
    padding:4px;display:flex;gap:0;flex-shrink:0;
  }
  .tab-indicator{
    position:absolute;top:4px;left:4px;height:25px;width:calc((100% - 8px) / 3);
    background:var(--white);border-radius:100px;z-index:0;
    transition:transform .34s cubic-bezier(.34,1.35,.5,1);
  }
  .tab{
    position:relative;z-index:1;
    flex:1;min-width:0;height:25px;border:none;background:transparent;cursor:pointer;
    border-radius:100px;font-size:12px;font-weight:500;color:var(--gray-300);
    display:flex;align-items:center;justify-content:center;transition:color .2s;
  }
  .tab.active{color:#000;font-weight:700;}

  /* ---------- Panels ---------- */
  .panel{width:308px;display:none;flex-direction:column;padding-bottom:24px;}
  .panel.active{display:flex;}

  /* Emirate list */
  .emirate-list{display:flex;flex-direction:column;}
  .emirate-item{
    padding:14px 4px;font-size:15px;font-weight:500;color:var(--gray-900);
    border:none;background:transparent;text-align:left;cursor:pointer;
    border-bottom:1px solid var(--border-tertiary);display:flex;align-items:center;justify-content:space-between;
  }
  .emirate-item:last-child{border-bottom:none;}
  .emirate-item:active{background:#fafafa;}
  .emirate-item.selected{color:var(--brand);font-weight:700;}
  .emirate-item .check{display:none;color:var(--brand);}
  .emirate-item.selected .check{display:block;}

  /* Keyboards */
  .keys{display:grid;gap:10px;}
  .keys.alpha{grid-template-columns:repeat(4,1fr);}
  .keys.num{grid-template-columns:repeat(3,1fr);}
  .key{
    height:39px;border:1.5px solid var(--gray-400);background:#fff;border-radius:4px;
    font-size:13px;font-weight:500;color:#000;cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:all .12s;
    padding:0;
  }
  .key:active{background:#f2f2f2;}
  .key.selected{border-color:var(--brand);color:var(--brand);background:#fff;}
  .key.fn-check{background:#fff;border-color:var(--gray-400);color:var(--gray-300);cursor:default;}
  .key.fn-check.active{background:var(--green-50);border-color:var(--green-600);color:var(--green-600);cursor:pointer;}
  .key.fn-back{color:var(--gray-900);}
  .key.fn-next{color:#9aa0ac;transition:background .18s,border-color .18s,color .18s;}
  .key.fn-next.active{background:var(--green-50);border-color:var(--green-600);color:var(--green-600);}
  .key.blank{border:none;background:transparent;cursor:default;}

  /* Special plate code */
  .special{margin-top:22px;text-align:center;}
  .special .label{font-size:12px;font-weight:700;color:#000;margin-bottom:10px;}
  .chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;}
  .chips::-webkit-scrollbar{height:0;}
  .chip{
    border:1px solid var(--border-tertiary);background:#fff;border-radius:999px;
    padding:4px 12px;font-size:14px;font-weight:700;color:var(--text-secondary);
    white-space:nowrap;cursor:pointer;flex-shrink:0;transition:all .15s;
  }
  .chip.selected{border-color:var(--brand);color:var(--brand);background:var(--brand-50);}

  /* ---------- Bottom bar ---------- */
  .bottombar{
    flex-shrink:0;padding:12px 16px 8px;
  }
  .btn-continue{
    width:100%;height:48px;border:none;border-radius:999px;background:var(--brand);
    color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;
    transform:translateY(170%);opacity:0;pointer-events:none;
    transition:transform .42s cubic-bezier(.16,1,.3,1),opacity .3s ease;
  }
  .btn-continue.visible{transform:translateY(0);opacity:1;pointer-events:auto;}
  .home-indicator{width:134px;height:5px;background:#000;border-radius:99px;margin:10px auto 6px;}

  .toast{
    position:absolute;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);
    background:#111;color:#fff;font-size:13px;font-weight:600;padding:12px 18px;border-radius:12px;
    opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.3);
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .hint{color:#8b8b93;font-size:11px;text-align:center;margin-top:14px;}

  /* ---------- Real-device / mobile: fill the screen like a native app ---------- */
  @media (max-width:600px){
    body{
      padding:0;
      background:var(--white);          /* no gray studio backdrop */
      align-items:stretch;
      justify-content:stretch;
      min-height:100dvh;
    }
    .phone{
      width:100%;
      max-width:none;
      height:100vh;
      height:100dvh;                    /* tracks the shrinking URL bar on mobile */
      border-radius:0;
      box-shadow:none;
    }
    /* Hide the simulated chrome — the real device already draws its own */
    .verbadge,
    .statusbar,
    .home-indicator{display:none;}
    /* Keep nav + bottom bar clear of the notch and home indicator */
    .navbar{
      height:calc(44px + env(safe-area-inset-top));
      padding-top:env(safe-area-inset-top);
    }
    .bottombar{
      padding-bottom:calc(16px + env(safe-area-inset-bottom));
    }
  }
</style>
</head>
<body>
  <div class="phone">
    <div class="verbadge">v13·no-arrow</div>
    <!-- Status bar -->
    <div class="statusbar">
      <span class="time">1:47</span>
      <span class="icons">
        <!-- cellular -->
        <svg width="18" height="12" viewBox="0 0 18 12"><rect x="0" y="8" width="3" height="4" rx="1"/><rect x="5" y="5" width="3" height="7" rx="1"/><rect x="10" y="2.5" width="3" height="9.5" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></svg>
        <!-- wifi -->
        <svg width="17" height="12" viewBox="0 0 17 12"><path d="M8.5 2C5.5 2 2.8 3.1.9 4.9l1.5 1.6C3.9 5 6.1 4 8.5 4s4.6 1 6.1 2.5l1.5-1.6C14.2 3.1 11.5 2 8.5 2z"/><path d="M8.5 6c-1.6 0-3.1.6-4.2 1.7l1.5 1.6c.7-.7 1.7-1.1 2.7-1.1s2 .4 2.7 1.1l1.5-1.6C11.6 6.6 10.1 6 8.5 6z"/><circle cx="8.5" cy="10.5" r="1.5"/></svg>
        <!-- battery -->
        <svg width="26" height="13" viewBox="0 0 26 13"><rect x="0.5" y="0.5" width="22" height="12" rx="3" fill="none" stroke="#000" stroke-opacity=".35"/><rect x="2" y="2" width="19" height="9" rx="1.5"/><rect x="23.5" y="4" width="1.8" height="5" rx="1"/></svg>
      </span>
    </div>

    <!-- Nav -->
    <div class="navbar">
      <button class="icon-btn" id="backBtn" aria-label="Back">
        <svg width="11" height="18" viewBox="0 0 11 18" fill="none"><path d="M9.5 1L1.5 9l8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="title">Motor insurance</div>
      <button class="icon-btn chat" aria-label="Chat">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M3 6a3 3 0 013-3h12a3 3 0 013 3v7a3 3 0 01-3 3H9l-5 4v-4H6a3 3 0 01-3-3V6z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><circle cx="18" cy="6" r="3" fill="var(--success-500)"/></svg>
      </button>
    </div>

    <!-- Body -->
    <div class="content">
      <h1 class="heading">Share plate details for instant quotes.</h1>

      <!-- Alert -->
      <div class="alert" id="alert">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" fill="var(--accent)"/><path d="M8 4v5M8 11.2v.1" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/></svg>
        <span id="alertText"></span>
      </div>

      <!-- Plate preview -->
      <div class="plate" id="plate">
        <div class="code placeholder" id="plateCode">0</div>
        <div class="emirate">
          <span class="ar" id="plateAr">الإمارات</span>
          <span class="ar" id="plateAr2">&nbsp;</span>
          <span class="code-abbr" id="plateAbbr">U.A.E</span>
        </div>
        <div class="number placeholder" id="plateNumber">00000</div>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <div class="tab-indicator"></div>
        <button class="tab active" data-tab="emirate">Emirate</button>
        <button class="tab" data-tab="code">Plate code</button>
        <button class="tab" data-tab="number">Plate number</button>
      </div>

      <!-- Emirate panel -->
      <div class="panel active" data-panel="emirate">
        <div class="emirate-list" id="emirateList"></div>
      </div>

      <!-- Plate code panel -->
      <div class="panel" data-panel="code">
        <div class="keys alpha" id="alphaKeys"></div>
        <div class="special">
          <div class="label">Special plate code?</div>
          <div class="chips" id="chips"></div>
        </div>
      </div>

      <!-- Plate number panel -->
      <div class="panel" data-panel="number">
        <div class="keys num" id="numKeys"></div>
      </div>
    </div>

    <!-- Bottom bar -->
    <div class="bottombar">
      <button class="btn-continue" id="continueBtn">Continue</button>
      <div class="home-indicator"></div>
    </div>

    <div class="toast" id="toast"></div>
  </div>

<script>
/* ---------------- Data ---------------- */
const EMIRATES = [
  {name:"Abu Dhabi", ar1:"الإمارات", ar2:"أبوظبي", abbr:"U.A.E  AD"},
  {name:"Dubai",     ar1:"الإمارات", ar2:"دبي",    abbr:"U.A.E  D"},
  {name:"Sharjah",   ar1:"الإمارات", ar2:"الشارقة", abbr:"U.A.E  SH"},
  {name:"Ajman",     ar1:"الإمارات", ar2:"عجمان",  abbr:"U.A.E  AJ"},
  {name:"Ras Al Khaimah", ar1:"الإمارات", ar2:"رأس الخيمة", abbr:"U.A.E  RAK"},
  {name:"Umm Al Quwain",  ar1:"الإمارات", ar2:"أم القيوين", abbr:"U.A.E  UQ"},
  {name:"Fujairah",  ar1:"الإمارات", ar2:"الفجيرة", abbr:"U.A.E  F"},
];
const SPECIAL_CODES = ["Classic","Code 9","White","Motor cycle 1","Grey","Red"];
// A plate code is 1–2 characters. Typing more than two makes it invalid and
// surfaces the "'XX' is not a valid plate code" alert (Figma error frame).
const CODE_MAX = 2;
const isCodeValid = c => c.length>=1 && c.length<=CODE_MAX;

/* ---------------- State ---------------- */
const state = { emirate:null, code:"", number:"", special:null };

/* ---------------- Elements ---------------- */
const $ = s => document.querySelector(s);
const tabs = document.querySelectorAll(".tab");
const panels = document.querySelectorAll(".panel");
const plate = $("#plate");
const alertBox = $("#alert");

/* ---------------- Render plate ---------------- */
function renderPlate(){
  const codeEl = $("#plateCode");
  codeEl.textContent = state.code || "0";
  codeEl.classList.toggle("placeholder", !state.code);
  codeEl.style.fontSize = state.code.length>=3 ? "18px" : state.code.length===2 ? "22px" : "30px";
  codeEl.style.letterSpacing = state.code.length>1 ? "0.5px" : "0";

  const numEl = $("#plateNumber");
  numEl.textContent = state.number ? state.number : "00000";
  numEl.classList.toggle("placeholder", !state.number);

  const e = state.emirate;
  $("#plateAr").textContent  = e ? e.ar1 : "الإمارات";
  $("#plateAr2").innerHTML    = e ? e.ar2 : "&nbsp;";
  $("#plateAbbr").textContent = e ? e.abbr : "U.A.E";
}

/* ---------------- Tabs ---------------- */
const TAB_ORDER=["emirate","code","number"];
function switchTab(name){
  tabs.forEach(t=>t.classList.toggle("active", t.dataset.tab===name));
  panels.forEach(p=>p.classList.toggle("active", p.dataset.panel===name));
  const idx=Math.max(0, TAB_ORDER.indexOf(name));
  const ind=document.querySelector(".tab-indicator");
  if(ind) ind.style.transform=`translateX(${idx*100}%)`;   // slide the white pill
  hideAlert();
  updateContinue();
}
// Gate the tabs: an emirate is required before code/number, a code before number.
tabs.forEach(t=>t.addEventListener("click",()=>{
  const target=t.dataset.tab;
  if((target==="code"||target==="number") && !state.emirate){
    showAlert("Choose an emirate to continue",{warn:true});
    return;
  }
  if(target==="number" && !state.code){
    showAlert("Share a plate code",{warn:true});
    return;
  }
  if(target==="number" && !isCodeValid(state.code)){
    codeError();
    return;
  }
  switchTab(target);
}));

/* ---------------- Emirate list ---------------- */
const emirateList = $("#emirateList");
EMIRATES.forEach(e=>{
  const btn=document.createElement("button");
  btn.className="emirate-item";
  btn.innerHTML=`<span>${e.name}</span><span class="check">
     <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8.5l3.5 3.5L13 4.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>`;
  btn.addEventListener("click",()=>{
    state.emirate=e;
    state.code="";                       // plate-code type (letters vs numbers) depends on the emirate
    document.querySelectorAll(".emirate-item").forEach(i=>i.classList.remove("selected"));
    btn.classList.add("selected");
    buildCodeKeyboard();                 // Dubai -> A–Z, all others -> numeric
    renderPlate();
    updateContinue();
    hideAlert();
  });
  emirateList.appendChild(btn);
});

/* ---------------- Plate-code keyboard ---------------- */
// Dubai plate codes are LETTERS (A–Z). Every other emirate uses a NUMERIC code.
const codeKeys=$("#alphaKeys");
const LETTERS="ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
const BACK_SVG=`<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22 5H8L2 12l6 7h14a2 2 0 002-2V7a2 2 0 00-2-2z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/><path d="M12 9.5l5 5M17 9.5l-5 5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>`;
const CHECK_SVG=`<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8.5l3.5 3.5L13 4.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
const ARROW_SVG=`<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 12h15M13 6l6 6-6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
const isNumericEmirate = () => !(state.emirate && state.emirate.name==="Dubai");

function addCodeChar(v){
  if(state.code.length>CODE_MAX) return;   // cap so only one over-limit char is shown
  state.code+=v;
  buildCodeKeyboard(); renderPlate(); updateContinue();
  if(state.code.length>CODE_MAX) codeError();   // more than two -> error
  else hideAlert();
}
function delCodeChar(){
  state.code=state.code.slice(0,-1);
  buildCodeKeyboard(); renderPlate(); updateContinue();
  if(state.code.length>CODE_MAX) codeError(); else hideAlert();
}
function codeCheck(){          // green ✓ — validate the code, then advance to Plate number
  if(!state.code) return;      // disabled until something is entered
  if(!isCodeValid(state.code)){ codeError(); return; }
  switchTab("number");
}

function buildCodeKeyboard(){
  codeKeys.innerHTML="";
  const numeric = isNumericEmirate();
  codeKeys.className = "keys "+(numeric ? "num" : "alpha");

  if(numeric){
    // 1-9, blank, 0, backspace
    ["1","2","3","4","5","6","7","8","9","blank","0","back"].forEach(v=>{
      const k=document.createElement("button");
      if(v==="blank"){ k.className="key blank"; k.disabled=true; }
      else if(v==="back"){ k.className="key fn-back"; k.innerHTML=BACK_SVG; k.addEventListener("click",delCodeChar); }
      else { k.className="key"+(state.code.includes(v)?" selected":""); k.textContent=v; k.addEventListener("click",()=>addCodeChar(v)); }
      codeKeys.appendChild(k);
    });
  } else {
    // Dubai: A–Z, backspace. A–X fills the first 6 rows; a leading blank on the
    // last row pushes Y, Z and backspace to the right.
    LETTERS.forEach((l,i)=>{
      if(i===24){                       // after X, before Y
        const filler=document.createElement("button");
        filler.className="key blank"; filler.disabled=true;
        codeKeys.appendChild(filler);
      }
      const k=document.createElement("button");
      k.className="key"+(state.code.includes(l)?" selected":"");
      k.textContent=l;
      k.addEventListener("click",()=>addCodeChar(l));
      codeKeys.appendChild(k);
    });
    const back=document.createElement("button");
    back.className="key fn-back"; back.innerHTML=BACK_SVG;
    back.addEventListener("click",delCodeChar);
    codeKeys.appendChild(back);
  }
}
buildCodeKeyboard();

/* ---------------- Special code chips ---------------- */
const chips=$("#chips");
SPECIAL_CODES.forEach(c=>{
  const chip=document.createElement("button");
  chip.className="chip";
  chip.textContent=c;
  chip.addEventListener("click",()=>{
    const on = state.special===c;
    state.special = on ? null : c;
    document.querySelectorAll(".chip").forEach(x=>x.classList.remove("selected"));
    if(!on) chip.classList.add("selected");
  });
  chips.appendChild(chip);
});

/* ---------------- Numeric keyboard ---------------- */
const numKeys=$("#numKeys");
function buildNum(){
  numKeys.innerHTML="";
  const layout=["1","2","3","4","5","6","7","8","9","blank","0","back"];
  layout.forEach(v=>{
    const k=document.createElement("button");
    k.className="key";
    if(v==="blank"){
      k.className="key blank"; k.disabled=true;
    } else if(v==="back"){
      k.classList.add("fn-back");
      k.innerHTML=`<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22 5H8L2 12l6 7h14a2 2 0 002-2V7a2 2 0 00-2-2z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/><path d="M12 9.5l5 5M17 9.5l-5 5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>`;
      k.addEventListener("click",()=>{ state.number=state.number.slice(0,-1); buildNum(); renderPlate(); updateContinue(); });
    } else {
      k.textContent=v;
      k.addEventListener("click",()=>{
        if(state.number.length>=5) return;
        state.number+=v; buildNum(); renderPlate(); updateContinue();
      });
    }
    numKeys.appendChild(k);
  });
}
buildNum();

/* ---------------- Alert / toast ---------------- */
function showAlert(html, {warn=false, plateError=false}={}){
  $("#alertText").innerHTML = html;
  alertBox.classList.toggle("warn", warn);
  alertBox.classList.add("show");
  plate.classList.toggle("error", plateError);
}
function hideAlert(){ alertBox.classList.remove("show","warn"); plate.classList.remove("error"); }
const codeError=()=>showAlert(`'<b>${state.code}</b>' is not a valid plate code`,{plateError:true});

let toastTimer;
function toast(msg){
  const t=$("#toast");
  t.textContent=msg; t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove("show"),1800);
}

/* ---------------- Continue ---------------- */
function updateContinue(){
  // Continue appears on EVERY selection screen once that screen's step is satisfied,
  // then slides in from the bottom.
  const cur = document.querySelector(".tab.active")?.dataset.tab;
  let ready=false;
  if(cur==="emirate")      ready = !!state.emirate;
  else if(cur==="code")    ready = isCodeValid(state.code);
  else if(cur==="number")  ready = state.number.length>=1;
  $("#continueBtn").classList.toggle("visible", ready);
}
function continueAction(){
  const cur = document.querySelector(".tab.active")?.dataset.tab;
  if(cur==="emirate"){
    if(!state.emirate){ showAlert("Choose an emirate to continue",{warn:true}); return; }
    switchTab("code");
  } else if(cur==="code"){
    if(!state.code){ showAlert("Share a plate code",{warn:true}); return; }
    if(!isCodeValid(state.code)){ codeError(); return; }
    switchTab("number");
  } else {
    if(!state.number.length) return;
    const emirate = state.emirate ? ` · ${state.emirate.name}` : "";
    toast(`Getting quotes for ${state.code} ${state.number}${emirate}`);
  }
}
$("#continueBtn").addEventListener("click",continueAction);

/* ---------------- Back ---------------- */
$("#backBtn").addEventListener("click",()=>{
  const order=["emirate","code","number"];
  const cur=[...tabs].find(t=>t.classList.contains("active")).dataset.tab;
  const i=order.indexOf(cur);
  if(i>0) switchTab(order[i-1]);
});

/* ---------------- Init ---------------- */
renderPlate();
updateContinue();   // ensure the button starts hidden on the Emirate tab
</script>
</body>
</html>
